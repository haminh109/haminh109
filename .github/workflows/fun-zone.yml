name: generate unified fun zone

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Debug environment
        run: |
          python --version
          pwd
          ls -la
          ls -la scripts || true

      - name: Generate unified SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_fun_zone.py haminh109
          ls -la generated
          test -f generated/fun-zone-light.svg
          test -f generated/fun-zone-dark.svg

      - name: Publish to fun-zone branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf outbranch
          mkdir -p outbranch/images
          cp generated/*.svg outbranch/images/

          cd outbranch
          git init
          git checkout -b fun-zone
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add images
          git commit -m "chore: update unified fun zone"

          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin fun-zone
